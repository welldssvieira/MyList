<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/main.css">
    <link rel="icon" type="image/png" href="./assets/img/Gemini_Generated_Image_x8kjjkx8kjjkx8kj-removebg-preview.png">
    <title>SONAR</title>
</head>

<body>
    <header>
        <div>
            <span>Março, 22, 2026</span>
            <div id="saudacaoUsuario">
                <img class="img_mao" src="./assets/img/output-onlinegiftools.gif" alt="">
                <h1>Sonar</h1>
            </div>
            <p>Organize suas tarefas e ganhe moedas !</p>
        </div>
        <div id="containerSaldo">
            <div id="saldoAtual">
                <span>Saldo:</span>
                <span id="saldo">0</span>

            </div>

            <div id="containerSaldoPendente">
                <span>Saldo Pendente:</span>
                <span id="saldoPendente">0</span>
            </div>
    </header>
    <hr>
    <main>
        <form action="">
            <div class="adiciona_tarefa">
                <input type="text" id="tituloTarefa" placeholder="Adicionar nova tarefa...">
                <button type="button" id="botaoAdicionarTarefa" onclick="criarTarefa()">+ Nova</button>
            </div>
        </form>

        <div id="lista"></div>
    </main>
    <script src="./assets/js/main.js"></script>
</body>

</html>
